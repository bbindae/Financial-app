<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9ca24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0932b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" />
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#4a90d9" stroke-width="6" opacity="0.6" />

  <!-- Candlestick chart elements -->
  <!-- Candle 1 - red/bearish -->
  <rect x="88" y="240" width="28" height="90" rx="4" fill="#e17055" opacity="0.9"/>
  <line x1="102" y1="210" x2="102" y2="360" stroke="#e17055" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- Candle 2 - green/bullish -->
  <rect x="148" y="200" width="28" height="80" rx="4" fill="url(#greenGrad)" opacity="0.9"/>
  <line x1="162" y1="170" x2="162" y2="310" stroke="#00b894" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- Candle 3 - red/bearish -->
  <rect x="208" y="230" width="28" height="70" rx="4" fill="#e17055" opacity="0.9"/>
  <line x1="222" y1="200" x2="222" y2="330" stroke="#e17055" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- Candle 4 - green/bullish (big) -->
  <rect x="268" y="160" width="28" height="100" rx="4" fill="url(#greenGrad)" opacity="0.9"/>
  <line x1="282" y1="130" x2="282" y2="290" stroke="#00b894" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- Upward trend line with glow -->
  <polyline points="90,330 162,260 222,290 282,180 370,120"
    fill="none" stroke="url(#greenGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)" opacity="0.8"/>

  <!-- Dollar sign in circle (options symbol) -->
  <circle cx="380" cy="140" r="60" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="380" cy="140" r="60" fill="none" stroke="#f9ca24" stroke-width="3" opacity="0.5"/>
  <text x="380" y="162" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
    fill="#1a1a2e" text-anchor="middle" opacity="0.95">$</text>

  <!-- Small decorative dots -->
  <circle cx="90" cy="330" r="6" fill="#00cec9" opacity="0.7"/>
  <circle cx="162" cy="260" r="6" fill="#00cec9" opacity="0.7"/>
  <circle cx="222" cy="290" r="6" fill="#00cec9" opacity="0.7"/>
  <circle cx="282" cy="180" r="6" fill="#00cec9" opacity="0.7"/>
  <circle cx="370" cy="120" r="6" fill="#00cec9" opacity="0.7"/>

</svg>
